<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Bowl Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Build Energy Own Bowl</h1>
        <p>Make your ideal smoothie bowl, acai bowl or an energy protein bowl!</p>
        
        <form id="bowlForm">
            <section>
                <h2>1. Choose Base</h2>
                <label><input type="radio" name="base" value="acai" required> Acai Base</label>
                <label><input type="radio" name="base" value="yogurt"> Greek Yogurt</label>
                <label><input type="radio" name="base" value="oatmeal"> Oatmeal</label>
                <label><input type="radio" name="base" value="chia"> Chia Pudding</label>
            </section>
