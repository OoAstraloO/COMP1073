<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Bowl Builder</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1> Build Energy Own Bowl</h1>
        <p>Make your ideal smoothie bowl, acai bowl or an energy protein bowl!</p>
        
        <form id="bowlForm">
    <section>
            <h2>1. Choose Base</h2>
            <label><input type="radio" name="base" value="acai" required> Acai Base</label>
            <label><input type="radio" name="base" value="yogurt"> Greek Yogurt</label>
            <label><input type="radio" name="base" value="oatmeal"> Oatmeal</label>
            <label><input type="radio" name="base" value="chia"> Chia Pudding</label>
    </section>
    <section>
            <h2>2. Select Fruits (choose up to 3)</h2>
            <label><input type="checkbox" name="fruits" value="banana"> Banana</label>
            <label><input type="checkbox" name="fruits" value="strawberry"> Strawberry</label>
            <label><input type="checkbox" name="fruits" value="blueberry"> Blueberry</label>
            <label><input type="checkbox" name="fruits" value="mango"> Mango</label>
            <label><input type="checkbox" name="fruits" value="kiwi"> Kiwi</label>
            <label><input type="checkbox" name="fruits" value="pineapple"> Pineapple</label>
    </section>
     <section>
        <h2>3. Add Toppings</h2>
             <label><input type="checkbox" name="toppings" value="granola"> Granola</label>
             <label><input type="checkbox" name="toppings" value="coconut"> Coconut Flakes</label>
             <label><input type="checkbox" name="toppings" value="nuts"> Nuts</label>
             <label><input type="checkbox" name="toppings" value="seeds"> Seeds</label>
             <label><input type="checkbox" name="toppings" value="honey"> Honey Drizzle</label>
     </section>
            
    <section>
        <h2>4.Add-ons</h2>
            <label><input type="checkbox" name="proteins" value="protein-powder"> Protein Powder</label>
            <label><input type="checkbox" name="proteins" value="greek-yogurt-extra"> Extra Greek Yogurt</label>
    </section>
            
    <section>
        <h2>5. Size</h2>
           <label><input type="radio" name="size" value="small" required> Small</label>
           <label><input type="radio" name="size" value="medium"> Medium</label>
           <label><input type="radio" name="size" value="large"> Large</label>
    </section>
